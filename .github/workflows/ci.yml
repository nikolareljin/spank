name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  go:
    uses: nikolareljin/ci-helpers/.github/workflows/go.yml@production
    with:
      working_directory: "."
      go_version: "1.22.2"
      lint_command: "./scripts/update_submodules.sh && ./scripts/lint.sh"
      test_command: "./scripts/update_submodules.sh && ./scripts/test.sh"
      build_command: "./scripts/update_submodules.sh && ./scripts/build.sh"

  mobile:
    uses: nikolareljin/ci-helpers/.github/workflows/ci.yml@production
    with:
      working_directory: "."
      java_version: "17"
      flutter_version: "3.38.7"
      flutter_channel: "stable"
      lint_command: "./scripts/update_submodules.sh && ./scripts/mobile_lint.sh"
      test_command: "./scripts/update_submodules.sh && ./scripts/mobile_test.sh"
      build_command: "./scripts/update_submodules.sh && ./scripts/mobile_build_debug_apk.sh"
